model_reasoning_effort = "high"
model_context_window = 1000000
model_auto_compact_token_limit = 900000

#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.5"
approval_policy = "never"
sandbox_mode = "workspace-write"
personality = "pragmatic"

# Per-repo custom instructions
project_doc_fallback_filenames = [".codex/AGENTS.override.md"]

[sandbox_workspace_write]
network_access = true

[mcp_servers.chrome-devtools]
command = "npx"
args = [ "chrome-devtools-mcp@latest" ]

[mcp_servers.context7]
command = "npx"
args = [ "-y", "@upstash/context7-mcp@latest" ]

[mcp_servers.next-devtools]
command = "npx"
args = [ "next-devtools-mcp@latest" ]

[mcp_servers.mapbox]
command = "npx"
args = [ "-y", "@mapbox/mcp-server@latest", "--disable-mcp-ui" ]
enabled = false

[mcp_servers.mapbox.env]
MAPBOX_ACCESS_TOKEN = ""

[mcp_servers.shadcn]
command = "npx"
args = [ "shadcn@latest", "mcp" ]

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
enabled = false

[mcp_servers.github.http_headers]
Authorization = ""

[mcp_servers.playwright]
args = [ "@playwright/mcp@latest" ]
command = "npx"

[features]
steer = true
search_tool = true
multi_agent = true
prevent_idle_sleep = true
js_repl = false
child_agents_md = true
memories = true
chronicle = false
goals = true

[plugins."github@openai-curated"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."google-drive@openai-curated"]
enabled = true

[plugins."sentry@openai-curated"]
enabled = false

[plugins."neon-postgres@openai-curated"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."slack@openai-curated"]
enabled = true

[plugins."codex-security@openai-curated"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."chrome@openai-bundled"]
enabled = true

[agents]
max_threads = 6
max_depth = 2

[tui.model_availability_nux]
"gpt-5.5" = 3

[memories]
generate_memories = true
use_memories = true

[desktop]
appearanceTheme = "system"
appearanceDarkCodeThemeId = "codex"
usePointerCursors = true
followUpQueueMode = "steer"
reviewDelivery = "detached"
preventSleepWhileRunning = true
keepRemoteControlAwakeWhilePluggedIn = true
git-branch-prefix = "pdionne/"
git-create-pull-request-as-draft = true
git-show-sidebar-pr-icons = true
notifications-turn-mode = "always"
conversationDetailMode = "STEPS_COMMANDS"

[desktop.appearanceDarkChromeTheme]
accent = "#0169cc"
contrast = 70
ink = "#fcfcfc"
opaqueWindows = false
surface = "#111111"

[desktop.appearanceDarkChromeTheme.fonts]
ui = "Inter"

[desktop.appearanceDarkChromeTheme.semanticColors]
diffAdded = "#00a240"
diffRemoved = "#e02e2a"
skill = "#b06dff"

[desktop.open-in-target-preferences]
global = "vscode"
